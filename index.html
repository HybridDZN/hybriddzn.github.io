<html lang="en" class="bg-white font-sans">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {

    </style>
</head>

        const container = document.getElementById("album-grid");

        albums.forEach(album => {
            const card = document.createElement("div");
            card.className = "rounded-2xl shadow-sm hover:shadow-md transition-shadow bg-white";

            card.innerHTML = `
        <div class="p-4">
          <a href="#" class="block overflow-hidden rounded-xl">
            <img src="${album.image}" alt="Album Art" class="w-full object-cover rounded-xl" />
          </a>
          <div class="mt-4">
            <h2 class="text-lg font-bold text-gray-900">${album.title}</h2>
            <p class="text-sm font-light text-gray-600">${album.artist}</p>
          </div>
        </div>
      `;

            container.appendChild(card);
        });
    </script>
</body>

</html>
