            }

        ];

        const isMobile = /Mobi/.test(navigator.userAgent);
        albums.sort((a, b) => a.title.localeCompare(b.title));

        const container = document.getElementById("album-grid");

        albums.forEach(album => {
            const card = document.createElement("div");
            card.className = "rounded-2xl border border-gray-200 shadow-sm hover:shadow-md transition-shadow bg-white";

            const link = isMobile
                ? album.spotify.replace("https://open.spotify.com/album/", "spotify://album/")
                : album.spotify;

            card.innerHTML = `
        <div class="p-4">
          <a href="${link}" target="_blank" class="block overflow-hidden rounded-xl">
            <img src="${album.image}" alt="Album Art" class="w-full object-cover rounded-xl" />
          </a>
          <div class="mt-4">
            <h2 class="text-lg font-bold text-gray-900">${album.title}</h2>
            <p class="text-sm font-light text-gray-600">${album.artist}</p>
          </div>
        </div>
      `;

            container.appendChild(card);
        });
